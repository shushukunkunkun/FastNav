# cloud_transform 只负责坐标转换，不做滤波。
# 输入点 $p_l$ 属于 mid360_link，TF 查询得到 $T = (R, t)$ 后输出 $p_o = R p_l + t$。
cloud_transform:
  # 原始点云来自 FastNav 标准雷达接口，感知模块不直接订阅 GZ topic。
  input_topic: "/fastnav/lidar/points"
  # 转换后的点云统一发布到 odom 坐标系，供后续滤波和局部建图使用。
  output_topic: "/fastnav/perception/cloud_odom"
  # 目标坐标系为 $odom$，即局部连续坐标系。
  target_frame: "odom"
  # TF 等待时间为 $0.05s$，超过该时间则丢弃当前帧并等待下一帧。
  tf_timeout: 0.05

# cloud_filter 只消费 odom 坐标系点云，不关心点云来自仿真还是真机。
cloud_filter:
  # 输入点云已满足 $frame_id = odom$。
  input_topic: "/fastnav/perception/cloud_odom"
  # 输出为第一版预处理结果，后续 local voxel map 将优先消费这个 topic。
  output_topic: "/fastnav/perception/cloud_filtered"
  # cloud_frame 是滤波后点云的输出坐标系，也是裁剪盒所在坐标系。
  cloud_frame: "odom"
  # sensor_frame 用来查询雷达当前位置 $s$，距离裁剪使用 $d_i = ||p_i - s||$。
  sensor_frame: "mid360_link"
  # 若短时间内查不到 $odom <- mid360_link$，滤波节点会退化使用 odom 原点作为 $s$。
  tf_timeout: 0.05

  # 距离裁剪保留满足 $range_min <= d_i <= range_max$ 的点。
  range_min: 0.2
  range_max: 20.0

  # 空间裁剪保留 odom 下满足 $x_min <= x_i <= x_max$ 的点。
  crop_x_min: -20.0
  crop_x_max: 20.0
  # 空间裁剪保留 odom 下满足 $y_min <= y_i <= y_max$ 的点。
  crop_y_min: -20.0
  crop_y_max: 20.0
  # 空间裁剪保留 odom 下满足 $z_min <= z_i <= z_max$ 的点。
  crop_z_min: -3.0
  crop_z_max: 5.0

  # VoxelGrid 的体素边长为 $l = 0.1m$，每个体素输出一个代表点以减少点数。
  voxel_leaf_size: 0.1
