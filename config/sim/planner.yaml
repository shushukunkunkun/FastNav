# 仿真 planner 覆盖参数。比 real 更激进，便于快速验证避障链路。
planner:
  physical_limits:
    max_vel: 2.0
    max_acc: 3.0
    max_jerk: 4.0
    feasibility_tolerance: 0.05

  local_map:
    resolution: 0.2
    local_x_size: 24.0
    local_y_size: 24.0
    local_z_size: 4.2
    local_z_min: -1.2
    local_z_max: 3.0

  astar:
    heuristic_weight: 1.2
    max_search_nodes: 180000
