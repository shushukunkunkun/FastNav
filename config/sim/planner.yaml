# fastnav_planner 只消费 FastNav 标准接口，不直接订阅 GZ / PX4 / MAVROS 专有 topic。
local_planner:
  odom_topic: "/fastnav/state/odom"
  cloud_topic: "/fastnav/perception/cloud_filtered"
  goal_topic: "/move_base_simple/goal"
  extra_goal_topic: "/fastnav/planner/goal"
  trigger_topic: "/traj_start_trigger"

  path_topic: "/fastnav/planner/path"
  searched_nodes_topic: "/fastnav/planner/searched_nodes"
  debug_occupied_cloud_topic: "/fastnav/planner/debug_occupied_cloud"
  debug_inflated_cloud_topic: "/fastnav/planner/debug_inflated_cloud"
  debug_corridor_topic: "/fastnav/planner/debug_corridor"
  minco_trajectory_topic: "/fastnav/planner/minco_trajectory"
  heartbeat_topic: "/fastnav/planner/heartbeat"
  fsm_state_topic: "/fastnav/planner/fsm_state"
  local_target_topic: "/fastnav/planner/local_target"
  timing_topic: "/fastnav/planner/timing"

  # planner debug 输出开关。
  # true: 发布 searched_nodes、debug map、FSM state、local_target 等调试 topic；
  # false: 不创建这些调试 publisher，只保留 path、minco_trajectory、heartbeat，减少通信冗余。
  debug:
    enable: true
    # 当 debug.enable=true 且这里为 true 时，后端 MINCO / fine check 失败会落盘一次现场快照。
    # 快照包含 filtered cloud、planner 内部 voxel debug map、A* 路径、safe corridor、MINCO 采样和失败原因。
    record_failure_cases: true
    failure_case_dir: "/home/shukun/Project/FastNav/tools/debug_cases"
    max_failure_cases: 200
    record_cloud: true
    record_voxel_map: true
    record_corridor: true
    record_minco_samples: true

  # planner 内部 debug map 使用独立 timer 固定频率发布，类似 EGO 的 GridMap::visCallback。
  # cloud 回调只更新 VoxelMap，不直接触发 RViz 地图发布。
  debug_map_publish_rate: 5.0

  # PlannerFSM 只管理规划状态和路径输出，不构造控制量；控制模块后续只消费路径或轨迹。
  fsm:
    exec_rate: 20.0
    safety_rate: 10.0
    collision_check_step: 0.1
    collision_check_horizon_ratio: 0.6666667
    emergency_time: 1.0
    planning_horizon: 8.0
    goal_tolerance: 0.3
    # EGO 风格主动重规划：当前局部轨迹执行超过 replan_time 后才滚动重规划。
    # 当前 local target 大多选在 planning_horizon 处，因此默认用 $T_r=\alpha H/v_{max}$ 自动计算；
    # 其中 $\alpha=2/3$ 表示飞完 horizon 的前 2/3 后触发下一次滚动规划。
    replan_time_auto: true
    replan_time_ratio: 0.6666667
    # 若 local target 已经是最终目标，且无人机离终点小于 no_replan_distance，则不再主动重规划，避免末端急刹和抖动。
    # 当 replan_time_auto=false 时，才使用下面这个手动值。
    replan_time: 1.85
    # 执行中重规划时，新轨迹从未来 $t_{now}+\Delta t_f$ 接上旧轨迹，traj_server 先缓存为 pending。
    replan_forward_dt: 0.4
    # 主动重规划至少要比当前局部轨迹结束早这么久触发，给 A*/corridor/MINCO 留计算余量。
    replan_lead_time: 0.8
    # 避免非常短的局部轨迹刚发布就立刻重规划。
    replan_min_time: 0.2
    # 用实际规划耗时的 EWMA 更新提前量估计，0 表示只使用 replan_lead_time。
    replan_time_ewma_alpha: 0.2
    # 每次 REPLAN_TRAJ 允许的随机重规划次数。
    # 一次 planFromCurrentTraj 会先尝试“旧轨迹剩余段拼接规划”和“完整 A* 规划”，随后最多执行这里配置的随机扰动尝试。
    replan_trial_times: 10
    no_replan_distance: 1.0
    have_trigger: true

  # PathOptimizer 由 LocalPlannerManager 持有：A* path -> shortcut -> safe corridor -> GCOPTER/MINCO。
  optimizer:
    enable: true
    shortcut: true
    line_check_step: 0.1
    minco_enable: true
    require_minco: true
    # MINCO 采样路径只用于 RViz 和 path topic；真正轨迹保存在 LocalTrajData 的 $p(t)$ 中。
    minco_sample_dt: 0.05
    # EGO-v2 风格 retry：MINCO 返回后若 fine check 失败，则调整走廊/代价重新优化。
    max_retry: 3

    retry:
      corridor_range_scale: 1.15
      corridor_progress_scale: 0.85
      weight_time_scale: 0.7
      penalty_pos_scale: 2.0
      penalty_vel_scale: 1.5
      penalty_body_rate_scale: 1.2
      penalty_tilt_scale: 1.2
      penalty_thrust_scale: 1.2

    corridor:
      # 每段走廊沿 A* shortcut 路径最多推进 progress 米，越小越稳但多面体数量更多。
      progress: 5
      # 每段路径周围 range 米内的障碍表面点会参与 FIRI，形成 $H_i[x^T,1]^T\le0$。
      range: 1.5
      eps: 1.0e-6
      enable_shortcut: true

    # GCOPTER/MINCO 后端优化参数。
    # 注意：这里的约束应满足 $planner \le PX4 \le vehicle$。
    # 如果 planner 允许的 $v,a,j$ 大于 PX4 实际限制，轨迹数学上可行，但 PX4 跟踪时会被限幅，表现为急刹、滞后或贴障。
    minco:
      # 时间代价权重 $w_T$。越大越偏向短时间/快轨迹；越小越偏向平滑但可能拖慢。
      weight_time: 1.0
      # 约束惩罚的平滑参数 $\epsilon$，避免 hinge penalty 在边界处不可导。
      smoothing_eps: 0.01
      # 每段多项式上做 penalty 积分的采样数量，越大越准但优化更慢。
      integral_intervals: 16
      # L-BFGS 相对代价收敛阈值，越小优化更充分但耗时更长。
      rel_cost_tol: 1.0e-5
      # 按路径长度分配 MINCO piece，近似为每 $1.0m$ 一个 piece；越小自由度越多、耗时越高。
      length_per_piece: 1.0
      # GCOPTER 速度软约束 $||v(t)|| \le v_{max}$。当前 2.5m/s 只适合 high PX4 参数。
      max_vel: 2.5
      # 机体系角速度软约束，单位 rad/s；$4.0 rad/s ~= 229 deg/s$，低于 x250 PX4 的 360deg/s roll/pitch rate。
      max_body_rate: 4.0
      # 最大倾角，单位 rad；$0.70 rad ~= 40.1 deg$，低于 x250 PX4 的 MPC_TILTMAX_AIR=45deg。
      max_tilt_angle: 0.70
      # 推力上下界，单位约为 N，GCOPTER 会结合 mass/gravity 判断 thrust 约束。
      min_thrust: 2.0
      max_thrust: 11.0
      # 无人机质量，影响平坦性模型中的 $f=m(a+g)$。
      # x250 body + 4 rotors + Mid360 约为 $0.45 + 4*0.012 + 0.265 = 0.763kg$。
      mass: 0.765
      # 重力加速度。
      gravity: 9.81
      # 简化阻力模型参数；当前设 0 表示不考虑气动阻力。
      horiz_drag: 0.0
      vert_drag: 0.0
      paras_drag: 0.0
      # 速度平滑 epsilon，避免速度接近 0 时某些归一化项数值不稳定。
      speed_eps: 0.01
      # 违反 corridor 的位置惩罚权重 $\lambda_p$；越大越不允许轨迹贴近/穿出走廊。
      penalty_pos: 10000.0
      # 速度超限惩罚权重 $\lambda_v$。
      penalty_vel: 1000.0
      # body rate 超限惩罚权重 $\lambda_\omega$。
      penalty_body_rate: 1000.0
      # 倾角超限惩罚权重 $\lambda_theta$。
      penalty_tilt: 1000.0
      # 推力超限惩罚权重 $\lambda_f$。
      penalty_thrust: 1000.0

    # 后端输出后的硬检查参数。
    # MINCO 中很多约束是 penalty 形式，不等价于严格满足；因此这里必须再次离散采样检查。
    feasibility:
      check_collision: true
      check_dynamics: true
      # 轨迹采样周期，用于检查 $p(t),v(t),a(t),j(t)$；越小越安全但检查更慢。
      sample_dt: 0.03
      # 碰撞线段检查步长，应小于等于地图 resolution 的一半左右。当前 map resolution=0.2m，因此 0.1m 合理。
      collision_check_step: 0.1
      # EGO-v2 风格 fine check：非最终 local target 只检查前 $2/3$，最终目标由代码强制检查完整轨迹。
      check_horizon_ratio: 0.6666667
      # 硬速度检查 $||v(t)|| \le v_{max}+tol$，应与 minco.max_vel 一致或略小。
      max_vel: 2.5
      # 硬加速度检查 $||a(t)|| \le a_{max}+tol$，低于 x250 PX4 的 MPC_ACC_HOR=3.0。
      max_acc: 3.0
      # 硬 jerk 检查 $||j(t)|| \le j_{max}+tol$，低于 x250 PX4 的 MPC_JERK_AUTO=10。
      max_jerk: 8.0
      # 动力学检查容差，避免数值采样误差导致边界附近误判。
      tolerance: 0.05

  frame_id: "odom"
  planning_horizon: 8.0
  goal_tolerance: 0.3
  # 点云只更新地图，不直接触发重规划；执行中是否重规划由 FSM 的时间阈值和安全检查决定。
  # 这与 EGO-Planner 一致，可避免每帧点云导致 EXEC_TRAJ / REPLAN_TRAJ 高频切换。
  replan_on_cloud: false

  # planner 内部持有自己的 VoxelMap，地图中心跟随无人机位置 $c$。
  map:
    resolution: 0.2  # NOTE: 这个参数应该严格与mapping.yaml中保持一致
    # 三张 forest 地图的障碍主要落在 $x,y in [-7,7]$，24m 局部窗口让目标点可以放在森林边缘或穿越到对侧。
    local_x_size: 24.0
    local_y_size: 24.0
    # z 方向使用相对无人机高度的窗口 $z in [c_z + local_z_min, c_z + local_z_max]$。
    # 对当前仿真飞行高度，4.2m 高度跨度足够覆盖树干点云和绕障搜索，同时避免 A* 在无意义高度上膨胀搜索量。
    local_z_size: 4.2
    local_z_min: -1.2
    local_z_max: 3.0
    drone_radius: 0.20   # NOTE: 这个参数应该严格与mapping.yaml中保持一致
    safety_margin: 0.08  # NOTE: 这个参数应该严格与mapping.yaml中保持一致
    # planner 内部地图采用多帧 log-odds 缓存：$l = log(p/(1-p))$。
    # 当前没有 raycasting free-space，p_miss 先作为后续接口保留；旧障碍通过 temporal_decay_log 缓慢回到未知 $l=0$。
    p_hit: 0.70
    p_miss: 0.45
    p_min: 0.12
    p_max: 0.97
    p_occ: 0.65
    temporal_decay_log: 0.05

  # A* 直接内存查询 VoxelMap，不通过 ROS service 高频查询地图。
  astar:
    allow_diagonal: true
    heuristic_weight: 1.2
    # A* 不再运行时扫描 clearance 邻域。
    # 这里的 min_clearance 会转化为 frontend_voxel_map 的额外膨胀半径：
    # frontend_inflation = drone_radius + safety_margin + min_clearance。
    # $min_clearance=0$ 时，frontend map 退化为基础 inflated map。
    min_clearance: 0.1
    # 下面两个参数为旧版运行时 clearance relaxation 预留；当前双地图前端不再使用。
    clearance_retry_scale: 0.5
    min_clearance_floor: 0.1
    # 复用 guide A* 路径：planGlobalTraj() 已搜索 start -> local_target，
    # planToGoal(local_target) 若起终点误差和碰撞检查都通过，则直接复用，减少一次重复 A*。
    enable_guide_path_reuse: true
    guide_reuse_start_tolerance: 0.6
    guide_reuse_goal_tolerance: 0.6
    # EGO / SUPER 风格前端硬截断，避免一次 A* 卡住 FSM 和 traj_server heartbeat。
    max_search_time: 0.2
    # 终点投影：当 goal/local target 超出局部地图时，将线段
    # $p(s)=p_{start}+s(p_{goal}-p_{start})$ 投影到局部 AABB 内部，避免 outside local map 直接失败。
    enable_goal_projection: true
    projection_margin_voxels: 2
    # 若投影点或 goal 落在 inflated obstacle 内，在半径内找最近 free 体素作为临时目标。
    nearest_free_search_radius: 1.5
    # TIME_OUT 降级：A* 超时但已经搜索出一段足够长的可行前缀时，返回 best-effort 路径。
    # guide search 若仍失败，会把 horizon 缩短为 $H'=\max(H_{min},\alpha H)$ 再尝试一次。
    allow_timeout_best_effort: true
    timeout_best_effort_min_length: 1.0
    timeout_horizon_scale: 0.6
    timeout_min_horizon: 1.5
    # Escape search：起点在 frontend inflated map 内时，先用基础 map 搜索到
    # $p \notin \mathcal{O}_{front}$ 的点，再继续常规 A*。
    enable_escape_search: true
    escape_max_radius: 1.5
    escape_max_search_time: 0.05
    escape_max_nodes: 3000
    # 24m x 24m x 4.2m 在 $0.2m$ 分辨率下约为 $120 * 120 * 21$ 个体素。
    # hard forest 中通道更弯，允许更多展开节点，避免过早触发 max_search_nodes。
    max_search_nodes: 180000
    check_line_collision: true
    line_check_step: 0.1
