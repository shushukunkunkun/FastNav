# fastnav_planner 只消费 FastNav 标准接口，不直接订阅 GZ / PX4 / MAVROS 专有 topic。
local_planner:
  odom_topic: "/fastnav/state/odom"
  cloud_topic: "/fastnav/perception/cloud_filtered"
  goal_topic: "/move_base_simple/goal"
  extra_goal_topic: "/fastnav/planner/goal"
  trigger_topic: "/traj_start_trigger"

  path_topic: "/fastnav/planner/path"
  searched_nodes_topic: "/fastnav/planner/searched_nodes"
  debug_occupied_cloud_topic: "/fastnav/planner/debug_occupied_cloud"
  debug_inflated_cloud_topic: "/fastnav/planner/debug_inflated_cloud"
  debug_corridor_topic: "/fastnav/planner/debug_corridor"
  minco_trajectory_topic: "/fastnav/planner/minco_trajectory"
  heartbeat_topic: "/fastnav/planner/heartbeat"
  fsm_state_topic: "/fastnav/planner/fsm_state"
  local_target_topic: "/fastnav/planner/local_target"
  timing_topic: "/fastnav/planner/timing"

  # planner debug 输出开关。
  # true: 发布 searched_nodes、debug map、FSM state、local_target 等调试 topic；
  # false: 不创建这些调试 publisher，只保留 path、minco_trajectory、heartbeat，减少通信冗余。
  debug:
    enable: true

  # planner 内部 debug map 使用独立 timer 固定频率发布，类似 EGO 的 GridMap::visCallback。
  # cloud 回调只更新 VoxelMap，不直接触发 RViz 地图发布。
  debug_map_publish_rate: 5.0

  # PlannerFSM 只管理规划状态和路径输出，不构造控制量；控制模块后续只消费路径或轨迹。
  fsm:
    exec_rate: 20.0
    safety_rate: 10.0
    collision_check_step: 0.1
    collision_check_horizon_ratio: 0.6666667
    emergency_time: 1.0
    planning_horizon: 8.0
    goal_tolerance: 0.3
    # EGO 风格主动重规划：当前局部轨迹执行超过 replan_time 后才滚动重规划。
    # 当前 local target 大多选在 planning_horizon 处，因此默认用 $T_r=\alpha H/v_{max}$ 自动计算；
    # 其中 $\alpha=2/3$ 表示飞完 horizon 的前 2/3 后触发下一次滚动规划。
    replan_time_auto: true
    replan_time_ratio: 0.6666667
    # 若 local target 已经是最终目标，且无人机离终点小于 no_replan_distance，则不再主动重规划，避免末端急刹和抖动。
    # 当 replan_time_auto=false 时，才使用下面这个手动值。
    replan_time: 1.85
    # 每次 REPLAN_TRAJ 允许的随机重规划次数。
    # 一次 planFromCurrentTraj 会先尝试“旧轨迹剩余段拼接规划”和“完整 A* 规划”，随后最多执行这里配置的随机扰动尝试。
    replan_trial_times: 10
    no_replan_distance: 1.0
    have_trigger: true

  # PathOptimizer 由 LocalPlannerManager 持有：A* path -> shortcut -> safe corridor -> GCOPTER/MINCO。
  optimizer:
    enable: true
    shortcut: true
    line_check_step: 0.1
    minco_enable: true
    require_minco: true
    # MINCO 采样路径只用于 RViz 和 path topic；真正轨迹保存在 LocalTrajData 的 $p(t)$ 中。
    minco_sample_dt: 0.05
    # EGO-v2 风格 retry：MINCO 返回后若 fine check 失败，则调整走廊/代价重新优化。
    max_retry: 3

    retry:
      corridor_range_scale: 1.0
      corridor_progress_scale: 1.0
      weight_time_scale: 1.0
      penalty_pos_scale: 2.0
      penalty_vel_scale: 1.5
      penalty_body_rate_scale: 1.0
      penalty_tilt_scale: 1.0
      penalty_thrust_scale: 1.0

    corridor:
      # 每段走廊沿 A* shortcut 路径最多推进 progress 米，越小越稳但多面体数量更多。
      progress: 5
      # 每段路径周围 range 米内的障碍表面点会参与 FIRI，形成 $H_i[x^T,1]^T\le0$。
      range: 1.5
      eps: 1.0e-6
      enable_shortcut: true

    minco:
      weight_time: 1.0
      smoothing_eps: 0.01
      integral_intervals: 16
      rel_cost_tol: 1.0e-5
      length_per_piece: 1.0
      max_vel: 2.5
      max_body_rate: 2.0
      max_tilt_angle: 0.52
      min_thrust: 2.0
      max_thrust: 20.0
      mass: 1.5
      gravity: 9.81
      horiz_drag: 0.0
      vert_drag: 0.0
      paras_drag: 0.0
      speed_eps: 0.01
      penalty_pos: 10000.0
      penalty_vel: 1000.0
      penalty_body_rate: 1000.0
      penalty_tilt: 1000.0
      penalty_thrust: 1000.0

    feasibility:
      check_collision: true
      check_dynamics: true
      sample_dt: 0.03
      collision_check_step: 0.1
      # EGO-v2 风格 fine check：非最终 local target 只检查前 $2/3$，最终目标由代码强制检查完整轨迹。
      check_horizon_ratio: 0.6666667
      max_vel: 2.5
      max_acc: 2.5
      max_jerk: 7.0
      tolerance: 0.05

  frame_id: "odom"
  planning_horizon: 8.0
  goal_tolerance: 0.3
  # 点云只更新地图，不直接触发重规划；执行中是否重规划由 FSM 的时间阈值和安全检查决定。
  # 这与 EGO-Planner 一致，可避免每帧点云导致 EXEC_TRAJ / REPLAN_TRAJ 高频切换。
  replan_on_cloud: false

  # planner 内部持有自己的 VoxelMap，地图中心跟随无人机位置 $c$。
  map:
    resolution: 0.2  # NOTE: 这个参数应该严格与mapping.yaml中保持一致
    # 三张 forest 地图的障碍主要落在 $x,y in [-7,7]$，24m 局部窗口让目标点可以放在森林边缘或穿越到对侧。
    local_x_size: 24.0
    local_y_size: 24.0
    # z 方向使用相对无人机高度的窗口 $z in [c_z + local_z_min, c_z + local_z_max]$。
    # 对当前仿真飞行高度，4.2m 高度跨度足够覆盖树干点云和绕障搜索，同时避免 A* 在无意义高度上膨胀搜索量。
    local_z_size: 4.2
    local_z_min: -1.2
    local_z_max: 3.0
    drone_radius: 0.1   # NOTE: 这个参数应该严格与mapping.yaml中保持一致
    safety_margin: 0.1  # NOTE: 这个参数应该严格与mapping.yaml中保持一致
    # planner 内部地图采用多帧 log-odds 缓存：$l = log(p/(1-p))$。
    # 当前没有 raycasting free-space，p_miss 先作为后续接口保留；旧障碍通过 temporal_decay_log 缓慢回到未知 $l=0$。
    p_hit: 0.70
    p_miss: 0.45
    p_min: 0.12
    p_max: 0.97
    p_occ: 0.65
    temporal_decay_log: 0.05

  # A* 直接内存查询 VoxelMap，不通过 ROS service 高频查询地图。
  astar:
    allow_diagonal: true
    heuristic_weight: 1.2
    # A* 不再运行时扫描 clearance 邻域。
    # 这里的 min_clearance 会转化为 frontend_voxel_map 的额外膨胀半径：
    # frontend_inflation = drone_radius + safety_margin + min_clearance。
    # $min_clearance=0$ 时，frontend map 退化为基础 inflated map。
    min_clearance: 0.3
    # 下面两个参数为旧版运行时 clearance relaxation 预留；当前双地图前端不再使用。
    clearance_retry_scale: 0.5
    min_clearance_floor: 0.1
    # EGO / SUPER 风格前端硬截断，避免一次 A* 卡住 FSM 和 traj_server heartbeat。
    max_search_time: 0.2
    # 24m x 24m x 4.2m 在 $0.2m$ 分辨率下约为 $120 * 120 * 21$ 个体素。
    # hard forest 中通道更弯，允许更多展开节点，避免过早触发 max_search_nodes。
    max_search_nodes: 180000
    check_line_collision: true
    line_check_step: 0.1
