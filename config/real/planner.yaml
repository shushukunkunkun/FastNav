# 真机 planner 覆盖参数。速度建议从保守值开始逐步放开。
planner:
  physical_limits:
    max_vel: 0.5
    max_acc: 1.5
    max_jerk: 3.0
    feasibility_tolerance: 0.05

  local_map:
    resolution: 0.2
    local_x_size: 12.0
    local_y_size: 12.0
    local_z_min: -1.5
    local_z_max: 3.0

  astar:
    heuristic_weight: 1.2
    min_clearance: 0.2
    max_search_time: 0.2
    enable_goal_projection: true
    projection_margin_voxels: 2
    nearest_free_search_radius: 1.0
    allow_timeout_best_effort: true
    timeout_best_effort_min_length: 0.8
    timeout_horizon_scale: 0.6
    timeout_min_horizon: 1.0
    enable_escape_search: true
    escape_max_radius: 1.0
    escape_max_search_time: 0.05
    escape_max_nodes: 2000
    max_search_nodes: 30000
